@router.get("/", response_model=List[JobResponse])
def list_jobs(
    page: int = 1,
    limit: int = 10,
    db: Session = Depends(get_db),
):
    offset = (page - 1) * limit
    return (
        db.query(Job)
        .filter(Job.is_active == True)
        .offset(offset)
        .limit(limit)
        .all()
    )
